name: tiipee
description: "Plus tu décroches, plus tu gagnes."
publish_to: 'none'

version: 1.0.13+26

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.9.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1

  # Monétisation
  purchases_flutter: ^8.9.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  firebase_messaging: ^15.2.5
  firebase_core: ^3.13.1
  firebase_analytics: ^11.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

# Splash natif — « ii » blanc centré sur fond vert Tiipee
flutter_native_splash:
  color: "#00C853"
  image: assets/icon/foreground.png
  android: true
  ios: true
  android_12:
    color: "#00C853"
    image: assets/icon/foreground.png

# Icône de lancement — « ii » blanc sur fond vert (signature Tiipee)
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#00C853"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
